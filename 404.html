<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/logica/assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/logica/assets/favicon-32x32.png">
<title>Page not found — Logica</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--text:#1A1A18;--text-secondary:#5C5C56;
  --text-muted:#8E8E86;--accent:#6B6B5E;--border:#E2E1DC;--border-hover:#B8B8B0;
  --mono:'DM Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
a{color:inherit}
.container{max-width:1080px;margin:0 auto;padding:0 28px;width:100%}

header{padding:20px 0 0}
.header-inner{display:flex;align-items:center;padding-bottom:20px;border-bottom:1px solid var(--border)}
.logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent)}
.logo a{text-decoration:none}

.error-content{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 28px}
.error-inner{text-align:center;max-width:480px}
.error-code{font-family:var(--mono);font-size:72px;font-weight:500;color:var(--border);letter-spacing:4px;line-height:1}
.error-title{font-size:28px;font-weight:700;margin-top:16px;letter-spacing:-0.5px}
.error-desc{font-size:15px;color:var(--text-secondary);margin-top:12px;line-height:1.65}
.error-link{display:inline-block;margin-top:28px;font-family:var(--mono);font-size:13px;
  letter-spacing:0.5px;color:var(--accent);text-decoration:none;
  border:1px solid var(--border);padding:10px 24px;border-radius:6px;transition:all .15s}
.error-link:hover{border-color:var(--border-hover);color:var(--text)}

footer{padding:24px 0;border-top:1px solid var(--border);margin-top:auto}
.footer-inner{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:0.5px;text-align:center}
</style>
</head>
<body>
<header><div class="container"><div class="header-inner">
  <div class="logo"><a href="/logica/">Logica</a></div>
</div></div></header>

<div class="error-content"><div class="error-inner">
  <div class="error-code">404</div>
  <div class="error-title">Page not found</div>
  <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
  <a href="/logica/" class="error-link">Back to Logica</a>
</div></div>

<footer><div class="container"><div class="footer-inner">
  Nick Chang · Strategy consultant · Payments & financial services
</div></div></footer>
</body>
</html>
